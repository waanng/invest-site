name: Update Asset Rotation Data

on:
  schedule:
    # 每天 UTC 13:30 运行（北京时间 21:30）
    # 黄金收盘后采集
    - cron: '30 13 * * *'
  
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests
        
    - name: Fetch market data
      run: |
        cd projects/asset-rotation
        python scripts/fetch_data.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add projects/asset-rotation/data/
        git diff --staged --quiet || (git commit -m "Update asset rotation data: $(date +'%Y-%m-%d')" && git push)