name: Update Gold IV Data

on:
  schedule:
    # 每天 UTC 13:30 运行（北京时间 21:30）
    # 黄金期货 20:00 收盘，21:30 数据已稳定
    - cron: '30 13 * * *'
  
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests
        
    - name: Fetch gold data
      id: fetch
      run: |
        cd projects/gold-iv
        python scripts/fetch_data.py
      continue-on-error: true
      
    - name: Fetch from backup source (if primary failed)
      if: steps.fetch.outcome == 'failure'
      env:
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      run: |
        cd projects/gold-iv
        python scripts/fetch_data_backup.py
      continue-on-error: true
        
    - name: Check data file
      run: |
        if [ -f "projects/gold-iv/data/gold_data.json" ]; then
          echo "Data file exists"
          cat projects/gold-iv/data/gold_data.json | head -20
        else
          echo "ERROR: Data file not found"
          exit 1
        fi
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add projects/gold-iv/data/
        git diff --staged --quiet || (git commit -m "Update gold IV data: $(date +'%Y-%m-%d')" && git push)