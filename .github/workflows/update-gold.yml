name: Update Gold IV Data

on:
  schedule:
    # 每天 UTC 13:30 运行（北京时间 21:30）
    # 黄金期货 20:00 收盘，21:30 数据已稳定
    - cron: '30 13 * * *'
  
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'

env:
  PYTHONUNBUFFERED: 1

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
        
    - name: Install dependencies
      run: |
        echo "=== Installing Python dependencies ==="
        python -m pip install --upgrade pip
        pip install yfinance pandas requests
        echo "=== Dependencies installed ==="
        
    - name: Debug info
      if: github.event.inputs.debug == 'true'
      run: |
        echo "=== Debug Mode Enabled ==="
        echo "Current time: $(date)"
        echo "Current UTC time: $(date -u)"
        echo "Python version: $(python --version)"
        echo "Working directory: $(pwd)"
        ls -la projects/gold-iv/
        
    - name: Fetch gold data from Yahoo Finance
      id: fetch_yahoo
      run: |
        echo "=== Starting Yahoo Finance data fetch ==="
        cd projects/gold-iv
        python scripts/fetch_data.py
        echo "=== Fetch completed with exit code: $? ==="
      
    - name: Fetch from Alpha Vantage (if Yahoo failed)
      id: fetch_alphavantage
      if: failure() && steps.fetch_yahoo.outcome == 'failure'
      env:
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      run: |
        echo "=== Yahoo Finance failed, trying Alpha Vantage ==="
        cd projects/gold-iv
        python scripts/fetch_data_backup.py
        echo "=== Backup fetch completed ==="
      
    - name: Verify data file
      run: |
        echo "=== Verifying data file ==="
        if [ -f "projects/gold-iv/data/gold_data.json" ]; then
          echo "✓ Data file exists"
          echo "=== Last 5 records ==="
          cat projects/gold-iv/data/gold_data.json | python -m json.tool | tail -30
          echo "=== File size ==="
          ls -lh projects/gold-iv/data/gold_data.json
        else
          echo "✗ ERROR: Data file not found!"
          exit 1
        fi
        
    - name: Check for data changes
      id: check_changes
      run: |
        echo "=== Checking for data changes ==="
        git status
        if git diff --quiet projects/gold-iv/data/; then
          echo "✗ No data changes detected"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "✓ Data changes detected"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "=== Changed files ==="
          git diff --name-only projects/gold-iv/data/
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo "=== Committing changes ==="
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add projects/gold-iv/data/
        git commit -m "Update gold IV data: $(date +'%Y-%m-%d')"
        git push
        echo "✓ Changes pushed successfully"
        
    - name: Notify on success
      if: success() && steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo "✅ SUCCESS: Gold data updated successfully!"
        echo "Date: $(date +'%Y-%m-%d')"
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ FAILURE: Data update failed!"
        echo "Please check the logs above for details."
        echo "Common issues:"
        echo "  - Yahoo Finance rate limiting"
        echo "  - Alpha Vantage API key not set"
        echo "  - Network connectivity issues"
        exit 1
